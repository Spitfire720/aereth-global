# Aereth - Lantern Marches Build 01
# MythicMobs starter skills draft.
# Keep effects low-impact. Starter area means pressure, not punishment theatre.

LM_StaggerStep:
  Skills:
    - effect:particles{p=ash;amount=8;hS=0.25;vS=0.15;speed=0.01} @self
    - delay 4
    - velocity{x=0;y=0.05;z=0} @self

LM_DimMemoryPulse:
  Skills:
    - effect:particles{p=reverse_portal;amount=12;hS=0.35;vS=0.35;speed=0.02} @target
    - sound{s=block.amethyst_block.chime;v=0.35;p=0.7} @target

LM_RoadMurmur:
