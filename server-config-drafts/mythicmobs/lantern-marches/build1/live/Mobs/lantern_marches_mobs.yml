# Aereth - Lantern Marches Build 01
# MythicMobs starter mob draft.
# Copy into plugins/MythicMobs/Mobs/ only after review.

LM_Roadstray:
  Type: ZOMBIE
  Display: '&7Roadstray'
  Health: 22
  Damage: 3
  Faction: LanternMarchesHostile
  Options:
    MovementSpeed: 0.22
    FollowRange: 18
    PreventOtherDrops: true
    PreventRandomEquipment: true
    Silent: false
    Despawn: true
  Equipment:
    - AIR HAND
    - LEATHER_HELMET HEAD
  Drops:
    - exp 3-5 1
  Skills:
    - skill{s=LM_StaggerStep} @self ~onTimer:80
    - skill{s=LM_DimMemoryPulse} @target ~onAttack 0.18
    - message{m="&8The road remembers a footstep that was never yours."} @PlayersInRadius{r=12} ~onDeath 0.08

